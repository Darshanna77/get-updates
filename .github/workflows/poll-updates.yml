name: Pulse Monitor - Poll Updates

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [poll_tick]

concurrency:
  group: pulse-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Use system Python
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          python3 -m pip install \
            --disable-pip-version-check \
            --no-input \
            --no-compile \
            -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python3 run_monitor.py

      - name: Commit database
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          [ -f pulse.db ] || touch pulse.db

          git add pulse.db

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update bot database [skip ci]"
          git push