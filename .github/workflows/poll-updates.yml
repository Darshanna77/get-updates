name: Pulse Monitor - Poll Updates

on:
  schedule:
    # Run every 10 minutes to reduce Action minutes usage.
    - cron: '2/10 * * * *'
  repository_dispatch:
    types: [poll_tick]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: pulse-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    permissions:
      contents: write
    # Use a slimmer Linux runner label as requested.
    runs-on: ubuntu-slim
    timeout-minutes: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python run_monitor.py

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          [ -f pulse.db ] || touch pulse.db
          git add pulse.db
          if ! git diff --cached --quiet; then
            git commit -m "chore: update bot database [skip ci]"
            git push
          else
            echo "No database changes to commit"
          fi
