name: NSE Bot - Poll Announcements

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  check:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure database file exists
        run: |
          touch nse_bot.db
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run announcement check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python check_announcements.py

      - name: Commit database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nse_bot.db
          if ! git diff --cached --quiet; then
            git commit -m "chore: update bot database [skip ci]"
            git push
          else
            echo "No database changes to commit"
          fi
